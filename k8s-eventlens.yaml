apiVersion: v1
kind: ConfigMap
metadata:
  name: eventlens-config
  namespace: default
data:
  eventlens.yaml: |
    server:
      port: 9090
      # WARNING: Replace "*" with your actual UI origin in production.
      # Example: "https://eventlens.yourcompany.com"
      allowed-origins:
        - "*"
      auth:
        enabled: false

    datasource:
      # TODO: CHANGE THIS to your k3s postgres service!
      # Example: jdbc:postgresql://my-postgres-svc:5432/my_database
      url: jdbc:postgresql://<postgres-service-name>:5432/<database_name>
      username: <postgres_user>
      password: <postgres_password>
      table: event_store  # Or leave blank for auto-detect

    kafka:
      # TODO: CHANGE THIS to your k3s kafka service!
      # Example: my-kafka-svc:9092
      bootstrap-servers: <kafka-service-name>:9092
      topic: domain-events
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eventlens
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eventlens
  template:
    metadata:
      labels:
        app: eventlens
    spec:
      containers:
        - name: eventlens
          # Pin to a specific image tag in production instead of "latest"
          image: docker.io/alphasudo2/eventlens-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: config-volume
              mountPath: /app/eventlens.yaml
              subPath: eventlens.yaml
      volumes:
        - name: config-volume
          configMap:
            name: eventlens-config
---
apiVersion: v1
kind: Service
metadata:
  name: eventlens-ui
  namespace: default
spec:
  # Exposes the UI outside of k3s on a random port (usually 30000-32767)
  type: NodePort
  selector:
    app: eventlens
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
