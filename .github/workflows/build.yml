name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Node.js 22
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Give execute permission for gradlew
      run: chmod +x gradlew

    - name: Compile and build (skip integration tests)
      run: ./gradlew build -x :eventlens-stream-kafka:test -x :eventlens-source-postgres:test --no-daemon

  integration-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Give execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Kafka integration tests
      run: ./gradlew :eventlens-stream-kafka:test --no-daemon

    - name: Run PostgreSQL integration tests
      run: ./gradlew :eventlens-source-postgres:test --no-daemon
